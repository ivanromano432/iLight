[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Scheduled function: invia promemoria push ogni ora al minuto 0
[functions.send-reminders]
  schedule = "0 * * * *"

# Redirect: URL puliti /privacy e /termini → file HTML statici
# IMPORTANTE: questi devono stare PRIMA del fallback SPA, altrimenti vengono catturati come route React.
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/termini"
  to = "/termini.html"
  status = 200

# SPA fallback (per evitare 404 su path React)
# La function è esposta direttamente su /api/anthropic via `config.path`
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache-Control: index.html e manifest mai cache (cosi' dopo ogni deploy il browser
# vede subito la nuova versione e carica il nuovo bundle JS con hash).
# Gli asset hashati in /assets/ invece sono cache per sempre (l'hash cambia ad ogni deploy).
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
