[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback (per evitare 404 su path React)
# La function è esposta direttamente su /api/anthropic via `config.path`
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
